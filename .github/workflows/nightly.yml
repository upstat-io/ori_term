name: Nightly

on:
  push:
    branches: [main]

concurrency:
  group: nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  ORITERM_CHANNEL: nightly

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libx11-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libwayland-dev \
            libxkbcommon-dev libegl-dev libvulkan-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-linux
      - name: Build
        run: cargo build --release
      - name: Strip binaries
        run: |
          strip target/release/oriterm
          strip target/release/oriterm-mux
      - name: Package
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          tar -czvf oriterm-nightly-${DATE}-${SHORT_SHA}-linux-x86_64.tar.gz \
            -C target/release oriterm oriterm-mux
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-nightly-linux-x86_64
          path: oriterm-nightly-*-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-2022
    timeout-minutes: 30
    # CI builds natively on Windows using MSVC (not the x86_64-pc-windows-gnu
    # cross-compile target used for local dev). MSVC produces better debuginfo
    # and avoids MinGW runtime dependencies.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: nightly-windows
      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc
      - name: Package
        shell: bash
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y%m%d)
          7z a oriterm-nightly-${DATE}-${SHORT_SHA}-windows-x86_64.zip \
            ./target/x86_64-pc-windows-msvc/release/oriterm.exe \
            ./target/x86_64-pc-windows-msvc/release/oriterm-mux.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: oriterm-nightly-windows-x86_64
          path: oriterm-nightly-*-windows-x86_64.zip

  release:
    name: Publish Nightly
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Copilot SDK
        run: pip install copilot-sdk

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum oriterm-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Compute release metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          DATE=$(date -u +%Y-%m-%d)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "name=Nightly ($DATE / $SHORT_SHA)" >> $GITHUB_OUTPUT

      - name: Gather release context
        id: commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v '^nightly$' \
            | grep '^v\|^nightly-' | head -1)

          if [[ -n "$PREV_TAG" ]]; then
            PREV_DATE=$(git log -1 --format=%aI "$PREV_TAG")
            LOG=$(git log "${PREV_TAG}..HEAD" \
              --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
            PREV_DATE=""
          fi

          if [[ -n "$PREV_DATE" ]]; then
            PR_BODIES=$(gh pr list --state merged --base main --limit 20 \
              --json number,title,body,mergedAt \
              --jq "[.[] | select(.mergedAt >= \"$PREV_DATE\")] \
                | .[] | \"## PR #\\(.number): \\(.title)\\n\\(.body // \"(no description)\")\\n\"")
          else
            PR_BODIES=$(gh pr list --state merged --base main --limit 10 \
              --json number,title,body \
              --jq '.[] | "## PR #\(.number): \(.title)\n\(.body // "(no description)")\n"')
          fi

          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "$LOG" > /tmp/commit-log.txt
          echo "$PR_BODIES" > /tmp/pr-bodies.txt

      - name: Generate AI release notes
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import asyncio, sys
          from pathlib import Path

          COMMIT_LOG = Path("/tmp/commit-log.txt").read_text()
          PR_BODIES = Path("/tmp/pr-bodies.txt").read_text()

          PROMPT = f"""Write brief nightly release notes for **oriterm** (a GPU-accelerated terminal emulator). This is an automated nightly build, not a milestone release.

          Format: A short summary paragraph (2-3 sentences) followed by a bulleted list of changes. Group into sections only if there are 5+ changes; otherwise use a flat list. Omit empty sections.

          Sections (if needed): Features, Bug Fixes, Improvements

          Rules:
          - PR descriptions are your PRIMARY source
          - Write from the user's perspective
          - Past tense ("Added", "Fixed")
          - Skip CI/docs/chore commits
          - Keep it concise — this is a nightly, not a milestone
          - Do NOT wrap in markdown fences
          - If there are very few changes, a 1-2 sentence summary is fine

          Pull request descriptions:
          {PR_BODIES}

          Commit log:
          {COMMIT_LOG}"""

          async def main():
              from copilot import CopilotClient, PermissionHandler
              client = CopilotClient()
              await client.start()
              try:
                  session = await client.create_session({
                      "model": "claude-sonnet-4.6",
                      "streaming": False,
                      "on_permission_request": PermissionHandler.approve_all,
                  })
                  done = asyncio.Event()
                  result = []

                  def on_event(event):
                      t = event.type.value if hasattr(event.type, 'value') else str(event.type)
                      if t == "assistant.message":
                          content = event.data.content if hasattr(event.data, 'content') else str(event.data)
                          result.append(content)
                      elif t == "session.idle":
                          done.set()

                  session.on(on_event)
                  await session.send({"prompt": PROMPT})
                  await asyncio.wait_for(done.wait(), timeout=120)

                  if result:
                      Path("/tmp/release-notes.txt").write_text(result[-1])
                      print("AI release notes generated successfully")
                  else:
                      raise RuntimeError("No response from model")
              finally:
                  await client.stop()

          try:
              asyncio.run(main())
          except Exception as e:
              print(f"::warning::AI release notes failed ({e}), falling back to commit log")
              log = Path("/tmp/commit-log.txt").read_text().strip()
              sections = {"Features": [], "Bug Fixes": [], "Other": []}
              for line in log.split("\n"):
                  line = line.strip()
                  if not line or not line.startswith("- "):
                      continue
                  subject = line[2:]
                  if subject.startswith("feat"):
                      sections["Features"].append(line)
                  elif subject.startswith("fix"):
                      sections["Bug Fixes"].append(line)
                  else:
                      sections["Other"].append(line)
              body = ""
              for section, items in sections.items():
                  if items:
                      body += f"### {section}\n\n" + "\n".join(items) + "\n\n"
              if not body.strip():
                  body = "See commit history for changes."
              Path("/tmp/release-notes.txt").write_text(body.strip())
          PYEOF

      # softprops/action-gh-release appends assets; delete old ones first.
      - name: Delete old nightly release assets
        run: |
          gh release view nightly --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            gh release delete-asset nightly "$asset" --yes
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: ${{ steps.meta.outputs.name }}
          body_path: /tmp/release-notes.txt
          files: artifacts/*
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
