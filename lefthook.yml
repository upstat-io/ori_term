pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.rs"
      run: cargo fmt --all -- --check
    clippy:
      glob: "*.rs"
      run: cargo clippy --target x86_64-pc-windows-gnu -- -D warnings
    build:
      glob: "*.rs"
      run: cargo build --target x86_64-pc-windows-gnu
    test:
      glob: "*.rs"
      run: cargo test

commit-msg:
  commands:
    conventional-commit:
      run: .lefthook/commit-msg.sh {1}
